apiVersion: apps/v1
kind: Deployment
metadata:
  name: conference-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conference-web
  template:
    metadata:
      labels:
        app: conference-web
    spec:
      containers:
      - name: conference-container
        # IMPORTANT: Use the same image name you used in your Jenkinsfile
        image: yamkumar-v/mid-term-web:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference-web
  ports:
    - port: 80
      targetPort: 80
      # This is the port you will use in your browser (e.g., localhost:30001)
      nodePort: 30001
